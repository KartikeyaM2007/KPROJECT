<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; font-family: sans-serif; }
  .wrap { background: #000; min-height: 100vh; padding: 2rem 1rem; }
  h1 { font-size: 18px; font-weight: 500; color: #fff; letter-spacing: 0.04em;
       text-transform: uppercase; border-bottom: 1px solid #333;
       padding-bottom: 1rem; margin-bottom: 2rem; }
  .mb-3 { margin-bottom: 1.25rem; }
  label { display: block; font-size: 11px; font-weight: 500; color: #888;
          letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  select, input[type=number] { width: 100%; background: #000; color: #fff;
    border: 1px solid #333; border-radius: 0; padding: 10px 12px;
    font-size: 14px; appearance: none; outline: none; }
  select:focus, input[type=number]:focus { border-color: #fff; }
  select option { background: #111; color: #fff; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .btn-primary { width: 100%; margin-top: 1.5rem; background: #fff; color: #000;
    border: none; padding: 12px; font-size: 13px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; }
  .btn-primary:hover { background: #ddd; }
  h2 { margin-top: 1.5rem; border: 1px solid #333; padding: 1rem;
       font-size: 13px; color: #888; font-weight: 400; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Student Exam Performance Prediction</h1>
  <form action="{{ url_for('predict_datapoint') }}" method="post">
    <div class="mb-3">
      <label>Gender</label>
      <select name="gender" required>
        <option disabled selected value="">Select gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>
    <div class="mb-3">
      <label>Race or Ethnicity</label>
      <select name="race_ethnicity" required>
        <option disabled selected value="">Select ethnicity</option>
        <option value="group A">Group A</option>
        <option value="group B">Group B</option>
        <option value="group C">Group C</option>
        <option value="group D">Group D</option>
        <option value="group E">Group E</option>
      </select>
    </div>
    <div class="mb-3">
      <label>Parental Level of Education</label>
      <select name="parental_level_of_education" required>
        <option disabled selected value="">Select education</option>
        <option value="associate's degree">Associate's degree</option>
        <option value="bachelor's degree">Bachelor's degree</option>
        <option value="high school">High school</option>
        <option value="master's degree">Master's degree</option>
        <option value="some college">Some college</option>
        <option value="some high school">Some high school</option>
      </select>
    </div>
    <div class="mb-3">
      <label>Lunch Type</label>
      <select name="lunch" required>
        <option disabled selected value="">Select lunch type</option>
        <option value="free/reduced">Free / reduced</option>
        <option value="standard">Standard</option>
      </select>
    </div>
    <div class="mb-3">
      <label>Test Preparation Course</label>
      <select name="test_preparation_course" required>
        <option disabled selected value="">Select course status</option>
        <option value="none">None</option>
        <option value="completed">Completed</option>
      </select>
    </div>
    <div class="row">
      <div class="mb-3">
        <label>Reading Score</label>
        <input type="number" name="reading_score" placeholder="0 – 100" min="0" max="100" />
      </div>
      <div class="mb-3">
        <label>Writing Score</label>
        <input type="number" name="writing_score" placeholder="0 – 100" min="0" max="100" />
      </div>
    </div>
    <input class="btn-primary" type="submit" value="Predict maths score" />
  </form>
  <h2>Predicted score — {{ results }}</h2>
</div>
</body>
</html>
